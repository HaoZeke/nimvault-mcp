name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: nimvault-mcp-x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: nimvault-mcp-aarch64-unknown-linux-gnu
          - target: x86_64-apple-darwin
            os: macos-latest
            name: nimvault-mcp-x86_64-apple-darwin
          - target: aarch64-apple-darwin
            os: macos-latest
            name: nimvault-mcp-aarch64-apple-darwin
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: nimvault-mcp-x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/nimvault-mcp ./nimvault-mcp
          chmod +x ./nimvault-mcp
          tar czf ${{ matrix.name }}.tar.gz nimvault-mcp
          sha256sum ${{ matrix.name }}.tar.gz > ${{ matrix.name }}.tar.gz.sha256

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/nimvault-mcp.exe .\nimvault-mcp.exe
          Compress-Archive -Path .\nimvault-mcp.exe -DestinationPath ${{ matrix.name }}.zip
          Get-FileHash ${{ matrix.name }}.zip -Algorithm SHA256 | ForEach-Object { "$($_.Hash)  ${{ matrix.name }}.zip" } | Out-File ${{ matrix.name }}.zip.sha256

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          generate_release_notes: true
          files: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.tar.gz.sha256
            ${{ matrix.name }}.zip
            ${{ matrix.name }}.zip.sha256

  publish-crates:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish (skip if no token)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "CARGO_REGISTRY_TOKEN not set — skip crates.io (GitHub Release assets are enough for binstall/npx)"
            exit 0
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          if curl -fsS "https://crates.io/api/v1/crates/nimvault-mcp/$VERSION" >/dev/null; then
            echo "Version $VERSION already on crates.io, skipping"
            exit 0
          fi
          cargo publish --allow-dirty

  npm-publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Publish (skip if no token / OIDC)
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN not set — trying provenance OIDC publish, else skip"
            npm publish --access public --provenance 2>/dev/null || {
              echo "npm publish skipped (configure NPM_TOKEN or trusted publishing)"
              exit 0
            }
            exit 0
          fi
          npm publish --access public || true
