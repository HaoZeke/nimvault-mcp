name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test
      - run: cargo build --release
      - name: CLI surface smoke
        run: |
          ./target/release/nimvault-mcp --version
          ./target/release/nimvault-mcp doctor | head -5
          ./target/release/nimvault-mcp serve --print-unit --socket /tmp/x.sock | head -3
