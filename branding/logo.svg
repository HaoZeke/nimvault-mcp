<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="nimvault">
  <title>nimvault</title>
  <desc>Vault strongbox with opaque sealed blob — encrypted nameless storage</desc>
  <rect width="128" height="128" rx="24" fill="#141414"/>
  <!-- vault / strongbox silhouette (shield-house) -->
  <path fill="#2a4a52" stroke="#2dd4bf" stroke-width="5" stroke-linejoin="round"
        d="M32 48 L64 28 L96 48 L96 92 Q96 100 88 100 L40 100 Q32 100 32 92 Z"/>
  <!-- door lines (drawers / sealed layers) -->
  <g stroke="#1a3338" stroke-width="3" stroke-linecap="round" opacity="0.85">
    <line x1="44" y1="52" x2="84" y2="52"/>
    <line x1="44" y1="64" x2="84" y2="64"/>
    <line x1="44" y1="76" x2="72" y2="76"/>
    <line x1="44" y1="88" x2="68" y2="88"/>
  </g>
  <!-- opaque blob / capsule (no filename) -->
  <ellipse cx="78" cy="62" rx="28" ry="18" fill="#1e1b4b" stroke="#2dd4bf" stroke-width="3.5" transform="rotate(-28 78 62)"/>
  <ellipse cx="78" cy="62" rx="14" ry="9" fill="#312e81" opacity="0.5" transform="rotate(-28 78 62)"/>
  <!-- abstract hash / integrity ticks on capsule -->
  <g stroke="#5eead4" stroke-width="1.6" stroke-linecap="round" opacity="0.9" transform="rotate(-28 78 62)">
    <line x1="72" y1="62" x2="84" y2="62"/>
    <line x1="76" y1="58" x2="76" y2="66"/>
    <line x1="80" y1="58" x2="80" y2="66"/>
    <line x1="74" y1="60" x2="82" y2="64"/>
  </g>
</svg>
